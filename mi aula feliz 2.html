<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi Aula Feliz - Pizarra Mágica</title>
  <style>
    /* --- CONFIGURACIÓN BASE PARA DISEÑO FLEXIBLE --- */
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none; /* Bloquea el movimiento de la página al dibujar */
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #FFFDE7;
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
      overflow: hidden;
    }

    /* TÍTULO DE LA APP */
    header {
      background: linear-gradient(135deg, #FF5722 0%, #FF7043 100%);
      color: white;
      text-align: center;
      padding: 10px 0;
      font-size: 26px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      z-index: 10;
    }

    /* PIZARRA GIGANTE ADAPTATIVA */
    #canvas-container {
      flex: 1; /* Esto hace que ocupe todo el espacio libre de la pantalla */
      position: relative;
      background-color: white;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* BARRA DE HERRAMIENTAS INTELIGENTE */
    #toolbar {
      background-color: #2c3e50;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.2);
      z-index: 10;
    }

    .toolbar-row {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap; /* Si los botones no caben, bajan ordenadamente */
      gap: 8px;
      width: 100%;
    }

    /* ESTILO DE BOTONES */
    .btn {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
      color: white;
    }
    .btn:active {
      transform: scale(0.9);
    }

    .btn-tool {
      background-color: #455a64;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: bold;
      gap: 4px;
    }
    .btn-tool.active {
      background-color: #0078d4;
      box-shadow: 0 0 8px #00bcd4;
    }
    .btn-clear {
      background-color: #d32f2f;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: bold;
    }

    /* CRAYONES DE COLORES VIVOS */
    .btn-color {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid transparent;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .btn-color.active {
      border-color: white;
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    /* SELECTOR ARCOÍRIS ESTILO POWERPOINT */
    .color-picker-wrapper {
      position: relative;
      width: 44px;
      height: 44px;
      overflow: hidden;
      border-radius: 50%;
      background: linear-gradient(45deg, red, orange, yellow, green, blue, purple);
      border: 3px solid transparent;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .color-picker-wrapper.active {
      border-color: white;
      transform: scale(1.1);
    }
    #advanced-color-picker {
      position: absolute;
      top: -10px; left: -10px;
      width: 70px; height: 70px;
      cursor: pointer;
      opacity: 0;
    }
    .rainbow-icon {
      position: absolute;
      font-size: 20px;
      pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* --- ADAPTACIÓN AUTOMÁTICA PARA CELULARES (Pantallas Chicas) --- */
    @media (max-width: 600px) {
      header {
        font-size: 20px;
        padding: 6px 0;
      }
      #toolbar {
        padding: 6px;
        gap: 6px;
      }
      .btn-tool, .btn-clear {
        padding: 8px 12px;
        font-size: 12px;
      }
      .btn-color, .color-picker-wrapper {
        width: 34px; /* Se encogen un poco en celular para no robar espacio */
        height: 34px;
      }
      .rainbow-icon {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <header>🎨 Mi Aula Feliz ✨</header>

  <div id="canvas-container">
    <canvas id="pizarra"></canvas>
  </div>

  <div id="toolbar">
    
    <div class="toolbar-row">
      <button id="tool-pincel" class="btn btn-tool active" onclick="setTool('pincel')">✏️ Pincelín</button>
      <button id="tool-marcador" class="btn btn-tool" onclick="setTool('marcador')">🖍️ Marcador</button>
      <button id="tool-borrador" class="btn btn-tool" onclick="setTool('borrador')">🧽 Borrar</button>
      <button class="btn btn-clear" onclick="clearAll()">🗑️ Limpiar Todo</button>
    </div>

    <div class="toolbar-row">
      <button class="btn btn-color active" style="background-color: #FF0000;" onclick="setColor(this, '#FF0000', 'Rojo')"></button>
      <button class="btn btn-color" style="background-color: #FFFF00;" onclick="setColor(this, '#FFFF00', 'Amarillo')"></button>
      <button class="btn btn-color" style="background-color: #0000FF;" onclick="setColor(this, '#0000FF', 'Azul')"></button>
      <button class="btn btn-color" style="background-color: #FF6600;" onclick="setColor(this, '#FF6600', 'Naranja')"></button>
      <button class="btn btn-color" style="background-color: #008000;" onclick="setColor(this, '#008000', 'Verde')"></button>
      <button class="btn btn-color" style="background-color: #8B4513;" onclick="setColor(this, '#8B4513', 'Café')"></button>
      <button class="btn btn-color" style="background-color: #D81B60;" onclick="setColor(this, '#D81B60', 'Rosa')"></button>
      <button class="btn btn-color" style="background-color: #5E005E;" onclick="setColor(this, '#5E005E', 'Morado')"></button>
      <button class="btn btn-color" style="background-color: #00FFFF;" onclick="setColor(this, '#00FFFF', 'Celeste')"></button>
      <button class="btn btn-color" style="background-color: #666666;" onclick="setColor(this, '#666666', 'Gris')"></button>
      <button class="btn btn-color" style="background-color: #000000;" onclick="setColor(this, '#000000', 'Negro')"></button>
      <button class="btn btn-color" style="background-color: #ffffff; border: 2px solid #ccc;" onclick="setColor(this, '#ffffff', 'Blanco')"></button>
      
      <div id="color-advanced-wrapper" class="color-picker-wrapper">
        <span class="rainbow-icon">🌈</span>
        <input type="color" id="advanced-color-picker" onchange="setAdvancedColor(this.value)">
      </div>
    </div>

  </div>

  <script>
    // --- Configuración y Redimensionamiento Seguro ---
    const canvas = document.getElementById('pizarra');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');

    let isDrawing = false;
    let lastX = 0; let lastY = 0;
    
    let currentSettings = {
      color: '#FF0000',
      tool: 'pincel'
    };

    // Esta función salva el dibujo si el usuario voltea la tablet o cambia el tamaño en laptop
    function resizeCanvas() {
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');
      tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
      tempCtx.drawImage(canvas, 0, 0);

      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;

      ctx.drawImage(tempCanvas, 0, 0);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }

    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 150);

    // --- Motor de Voz Infantil ---
    function speakKinder(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'es-MX';
        msg.rate = 0.88; 
        msg.pitch = 1.35; 
        window.speechSynthesis.speak(msg);
      }
    }

    // --- Motor de Trazos Unificados (Dedo, Mouse, Lápiz) ---
    function getCoords(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function startDrawing(e) {
      isDrawing = true;
      const pos = getCoords(e);
      lastX = pos.x; lastY = pos.y;
      draw(e); 
    }

    function draw(e) {
      if (!isDrawing) return;
      const pos = getCoords(e);
      
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);

      // Comportamiento de Herramientas
      if (currentSettings.tool === 'borrador') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 45; 
      } else if (currentSettings.tool === 'marcador') {
        ctx.globalCompositeOperation = 'source-over';
        const r = parseInt(currentSettings.color.slice(1, 3), 16);
        const g = parseInt(currentSettings.color.slice(3, 5), 16);
        const b = parseInt(currentSettings.color.slice(5, 7), 16);
        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.45)`; // Semi-transparente estilo PowerPoint
        ctx.lineWidth = 26;
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = currentSettings.color;
        ctx.lineWidth = 7;
      }

      ctx.stroke();
      [lastX, lastY] = [pos.x, pos.y];
    }

    function stopDrawing() {
      isDrawing = false;
      ctx.beginPath();
    }

    // Eventos universales compatibles con clics de laptop y gestos táctiles de tablet/celular
    canvas.addEventListener('pointerdown', startDrawing);
    window.addEventListener('pointermove', draw);
    window.addEventListener('pointerup', stopDrawing);

    // --- Controladores de la barra ---
    function setTool(toolName) {
      currentSettings.tool = toolName;
      document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
      document.getElementById(`tool-${toolName}`).classList.add('active');
    }

    function setColor(element, hex, name) {
      currentSettings.color = hex;
      if (currentSettings.tool === 'borrador') {
        setTool('pincel');
      }
      document.querySelectorAll('.btn-color, .color-picker-wrapper').forEach(b => b.classList.remove('active'));
      element.classList.add('active');
      speakKinder(name);
    }

    function setAdvancedColor(hex) {
      currentSettings.color = hex;
      if (currentSettings.tool === 'borrador') {
        setTool('pincel');
      }
      document.querySelectorAll('.btn-color').forEach(b => b.classList.remove('active'));
      document.getElementById('color-advanced-wrapper').classList.add('active');
    }

    function clearAll() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round'; 
      speakKinder("Limpiar todo");
    }
  </script>
</body>
</html>
